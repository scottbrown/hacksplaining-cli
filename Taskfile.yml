version: "3"

vars:
  BINARY: hacksplaining
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the CLI binary
    cmds:
      - go build -ldflags "-X github.com/scottbrown/hacksplaining-cli/cmd.Version={{.VERSION}}" -o {{.BINARY}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY}}"

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}

  install:
    desc: Install the binary to $GOPATH/bin
    cmds:
      - go install -ldflags "-X github.com/scottbrown/hacksplaining-cli/cmd.Version={{.VERSION}}" .
