version: "3"

vars:
  BUILD_DIR: .build
  BINARY: hacksplaining
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the CLI binary
    cmds:
      - go build -ldflags "-X github.com/scottbrown/hacksplaining-cli/cmd.Version={{.VERSION}}" -o {{.BUILD_DIR}}/{{.BINARY}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY}}"

  test:
    desc: Run tests
    cmds:
      - go test ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BUILD_DIR}}
